<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VEDA · Made to Order</title>
<style>html,body{margin:0;padding:0;background:#3a2318}</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style id="veda-overrides">
/* ── Serif display font for all emotional headings ── */
.heroLine, .secTitle, .whisper > p, .filmCaption, .pull blockquote,
.chapBody h3, .catLine, blockquote { font-family: 'Cormorant Garamond', Georgia, serif !important; }

/* ── Mobile base improvements ── */
.heroLine  { font-size: 44px !important; line-height: 1.06 !important; letter-spacing: -.025em !important; font-weight: 300 !important; }
.secTitle  { font-size: 28px !important; line-height: 1.18 !important; font-weight: 300 !important; }
.whisper > p { font-size: 18px !important; line-height: 1.72 !important; font-style: italic !important; }
.pull blockquote { font-size: 22px !important; line-height: 1.4 !important; font-weight: 300 !important; }
.chapBody h3 { font-size: 17px !important; font-family: 'Cormorant Garamond', Georgia, serif !important; font-weight: 600 !important; }
.heroText { text-align: left !important; padding: 0 26px !important; }
.heroDots { justify-content: flex-start !important; padding-left: 26px !important; }

/* Mobile vertical steps */
.stepRail { display: flex !important; flex-direction: column !important; overflow-x: visible !important; scroll-snap-type: none !important; gap: 16px !important; padding: 4px 20px !important; }
.slide     { flex: none !important; width: 100% !important; scroll-snap-align: none !important; }
.stepDots  { display: none !important; }

/* Mobile spacing */
section.whisper  { padding: 56px 24px 16px !important; }
section.chapters { padding: 56px 0 6px !important; }
section.film     { padding: 56px 20px 6px !important; }
section.pull     { padding: 56px 24px !important; }
section.archive  { padding: 56px 20px 6px !important; }
section.stories  { padding: 56px 0 6px !important; }
section.chatMock { padding: 56px 20px 6px !important; }
section.begin    { padding: 56px 20px 6px !important; }
section.faq      { padding: 56px 20px 60px !important; }

/* ── DESKTOP LAYOUT ── */
@media (min-width: 768px) {

  /* Open the scroll container */
  html, body { overflow: auto !important; background: #FFF8E6 !important; }
  .veda-wrap  { display: block !important; background: #FFF8E6 !important; min-height: 100vh; }
  .veda       { max-width: 100% !important; height: auto !important; min-height: 100vh; overflow: visible !important; box-shadow: none !important; background: #FFF8E6 !important; }

  /* Fixed full-width header */
  .hdr { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; width: 100% !important; padding: 16px clamp(40px,6vw,100px) !important; z-index: 50 !important; background: rgba(255,248,230,.95) !important; backdrop-filter: blur(12px) !important; }
  .wordmark { height: 30px !important; }

  /* Hero: cinematic */
  .hero { aspect-ratio: 21/8 !important; width: 100% !important; }
  .heroLine { font-size: clamp(56px, 6.5vw, 96px) !important; max-width: 860px !important; }
  .heroSub  { font-size: 18px !important; max-width: 500px !important; margin-top: 14px !important; }
  .heroText { padding: 0 clamp(60px,8vw,120px) !important; bottom: clamp(60px,8vh,100px) !important; max-width: 1000px !important; }
  .heroDots { padding-left: clamp(60px,8vw,120px) !important; bottom: 24px !important; }

  /* Content max-width constraint for all sections */
  section.whisper, section.chapters, section.film, section.pull,
  section.archive, section.stories, section.chatMock, section.begin, section.faq, .ftr {
    max-width: 1240px !important;
    margin-left: auto !important;
    margin-right: auto !important;
    padding-left: clamp(40px,6vw,100px) !important;
    padding-right: clamp(40px,6vw,100px) !important;
  }

  /* Whisper: centered italic intro */
  section.whisper { padding-top: 100px !important; padding-bottom: 24px !important; }
  .whisper > p { font-size: 26px !important; max-width: 780px !important; margin: 0 auto !important; text-align: center !important; }

  /* Process steps: 3-col grid */
  section.chapters { padding-top: 90px !important; }
  .chapHead { text-align: center !important; max-width: 640px !important; margin: 0 auto 44px !important; padding: 0 !important; }
  .stepRail {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    overflow: visible !important;
    padding: 0 !important;
    gap: 28px !important;
    flex-direction: unset !important;
  }
  .secTitle { font-size: clamp(30px, 3.2vw, 46px) !important; }

  /* Film */
  section.film { padding-top: 90px !important; }
  .filmWrap  { aspect-ratio: 16/9 !important; max-width: 100% !important; border-radius: 22px !important; }
  .filmCaption { text-align: center !important; margin-top: 20px !important; font-size: 19px !important; }

  /* Pull quote */
  section.pull { padding-top: 110px !important; padding-bottom: 110px !important; text-align: center !important; }
  .pull blockquote { font-size: clamp(28px, 4vw, 54px) !important; max-width: 860px !important; margin: 0 auto !important; line-height: 1.28 !important; }

  /* Archive: 3-col grid */
  section.archive { padding-top: 90px !important; }
  .archIntro { max-width: 640px !important; margin: 0 auto 10px !important; text-align: center !important; }
  .rail { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 26px !important; overflow: visible !important; padding: 20px 0 0 !important; margin-top: 10px !important; }
  .acard { flex: none !important; width: 100% !important; scroll-snap-align: none !important; }

  /* Stories: 3-col grid */
  section.stories { padding-top: 90px !important; }
  .reviewRail { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 24px !important; overflow: visible !important; padding: 20px 0 0 !important; }
  .rcard { flex: none !important; width: 100% !important; }

  /* Chat mock: constrained */
  section.chatMock { padding-top: 90px !important; }

  /* Begin: 2-col entry doors */
  section.begin { padding-top: 90px !important; }
  .doorRow { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 20px !important; }

  /* FAQ: 2-col using grid on parent */
  section.faq { padding-top: 90px !important; padding-bottom: 100px !important; display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 0 60px !important; align-items: start !important; }
  section.faq .secHead { grid-column: 1 / -1 !important; }
  .fitem { break-inside: avoid; }

  /* Footer */
  .ftr { padding-top: 60px !important; }
  .ftr-inner { display: grid !important; grid-template-columns: 2fr 1fr 1fr 1fr !important; gap: 40px !important; }

  /* Sticky: full-width */
  .sticky { left: 0 !important; right: 0 !important; width: 100% !important; max-width: 100% !important; transform: none !important; }
  .sticky .sbtn.wa { max-width: 520px !important; margin: 0 auto !important; display: flex !important; }
}

@media (min-width: 1100px) {
  .heroLine { font-size: clamp(72px, 7vw, 108px) !important; }
}
</style></head>

.chatLead{text-align:center;font-size:13.5px;font-style:italic;color:${A.deepGold};margin:0 0 4px}
.doors{padding-top:34px}
.chatMock{padding-top:18px}
.begin{padding-top:6px}

/* entry doors */
.doors{padding:26px 20px 4px}
.doorRow{display:flex;flex-direction:column;gap:11px;margin-top:14px}
.door{display:block;text-decoration:none;background:rgba(185,152,116,.1);border:1px solid rgba(185,152,116,.3);
  border-radius:15px;padding:16px 18px;transition:border-color .2s,background .2s;position:relative}
.door:hover{border-color:${A.rust};background:rgba(185,152,116,.16)}
.doorIcon{width:34px;height:34px;border-radius:50%;border:1px solid rgba(185,152,116,.55);background:${A.beige};
  display:flex;align-items:center;justify-content:center;color:${A.rust};margin-bottom:10px}
.doorT{font-size:15.5px;font-weight:600;color:${A.brown};margin-bottom:3px}
.doorD{font-size:12.5px;font-weight:300;line-height:1.55;color:rgba(72,45,34,.8);margin-bottom:9px}
.doorGo{font-size:11.5px;font-weight:600;color:${A.rust};letter-spacing:.03em}

/* effort line */
.effortLine{font-size:12.5px;font-weight:500;color:${A.deepGold};margin:10px 0 0;letter-spacing:.02em}

/* ref inset on archive */
.refInset{position:absolute;bottom:8px;left:8px;display:flex;flex-direction:column;align-items:center;gap:3px}
.refInset img{width:52px;height:52px;object-fit:cover;border-radius:9px;border:2px solid ${A.beige};
  box-shadow:0 3px 10px rgba(0,0,0,.25)}
.refInset span{font-size:8.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:${A.beige};
  background:rgba(72,45,34,.75);padding:2px 7px;border-radius:10px}
.aimg{position:relative}

/* chat mock */
.chatMock{padding:34px 22px 8px}
.chat{margin:20px 0 14px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:86%;border-radius:15px;padding:11px 13px;position:relative}
.bubble p{font-size:12.5px;line-height:1.55;margin:0;color:${A.brown}}
.bubble.me{align-self:flex-end;background:rgba(139,63,44,.12);border:1px solid rgba(139,63,44,.22);
  border-bottom-right-radius:5px}
.bubble.them{align-self:flex-start;background:${A.beige};border:1px solid rgba(185,152,116,.4);
  border-bottom-left-radius:5px;box-shadow:0 2px 8px rgba(72,45,34,.06)}
.attach{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:500;color:${A.deepGold};
  background:rgba(185,152,116,.18);padding:4px 9px;border-radius:9px;margin-top:7px}
.bubble .time{display:block;font-size:9px;color:${A.deepGold};margin-top:6px;text-align:right;opacity:.8}
.bubble .who{display:block;font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:${A.rust};margin-top:8px}
.chatNote{text-align:center;font-size:12px;font-style:italic;color:${A.deepGold};margin:0}

/* risk-reversal strip */
.promiseStrip{display:flex;justify-content:space-around;gap:6px;margin-top:22px;padding:16px 8px;
  background:rgba(185,152,116,.1);border:1px solid rgba(185,152,116,.25);border-radius:14px}
.promiseStrip .pItem{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;
  font-size:10px;font-weight:600;line-height:1.35;color:${A.deepGold};text-align:center}
.promiseStrip .pItem svg{color:${A.rust}}

.makingBand{margin-top:26px;padding:28px 0 6px;background:rgba(185,152,116,.14);
  border-top:1px solid rgba(185,152,116,.28);border-bottom:1px solid rgba(185,152,116,.28)}
.makingBand .pull{padding-top:34px}
.catBand{position:relative;display:block;margin-top:26px;aspect-ratio:16/14;overflow:hidden;
  background:#1e3a34;text-decoration:none;cursor:pointer}
.catBand img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s}
.catBand:hover img{transform:scale(1.03)}
.catShade{position:absolute;inset:0;background:linear-gradient(to top, rgba(30,25,20,.72), rgba(30,25,20,.08) 60%)}
.catText{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:0 26px 30px;z-index:2;text-align:center}
.catEyebrow{font-size:10.5px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:${A.gold};margin-bottom:10px}
.catLine{font-size:20px;font-weight:300;font-style:italic;color:${A.beige};line-height:1.45;margin-bottom:16px;
  text-shadow:0 1px 8px rgba(0,0,0,.35)}
.catCta{display:inline-block;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:${A.beige};border:1px solid rgba(255,248,230,.55);padding:11px 20px;border-radius:24px;transition:background .2s}
.catBand:hover .catCta{background:rgba(255,248,230,.14)}
.veda-wrap{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
  background:radial-gradient(120% 60% at 50% 0%, rgba(137,110,80,.18), transparent 60%), #3a2318;}
.veda,.veda *{box-sizing:border-box;font-family:'Switzer',-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
.veda{position:relative;width:100%;max-width:420px;height:100vh;overflow-y:auto;overflow-x:hidden;
  background:${A.beige};color:${A.brown};box-shadow:0 0 60px rgba(0,0,0,.35);}
.veda::-webkit-scrollbar{width:0}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .75s cubic-bezier(.2,.7,.2,1),transform .75s cubic-bezier(.2,.7,.2,1);}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}.heroImg{transition:none!important}}

.hdr{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;background:rgba(255,248,230,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(185,152,116,.28);}
.hdr .icon{background:none;border:none;color:${A.brown};padding:4px;cursor:pointer;display:flex}
.wordmark{height:27px;object-fit:contain;margin-right:auto;margin-left:10px}
.hdrIcons{display:flex;align-items:center;gap:2px}

/* hero */
.hero{position:relative;width:100%;aspect-ratio:4/5;overflow:hidden;background:#2a1c14}
.heroImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.2s ease}
.heroImg.on{opacity:1}
.heroShade{position:absolute;inset:0;background:linear-gradient(to top, rgba(30,22,16,.72), rgba(30,22,16,.06) 55%)}
.heroText{position:absolute;left:0;right:0;bottom:44px;text-align:center;padding:0 26px;z-index:2}
.heroEyebrow{font-size:11px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:${A.gold};margin-bottom:12px}
.heroLine{font-size:33px;font-weight:300;line-height:1.16;letter-spacing:-.01em;color:${A.beige};margin:0 0 12px}
.heroSub{font-size:14px;font-weight:300;color:rgba(255,248,230,.85)}
.heroDots{position:absolute;bottom:16px;left:0;right:0;display:flex;justify-content:center;gap:7px;z-index:2}
.hDot{width:5px;height:5px;border-radius:50%;background:rgba(255,248,230,.4);cursor:pointer;transition:all .3s}
.hDot.on{background:${A.beige};width:16px;border-radius:3px}

/* whisper */
.whisper{text-align:center;padding:38px 30px 8px}
.whisper p{font-size:15.5px;font-weight:300;line-height:1.75;color:rgba(72,45,34,.88);margin:0;font-style:italic}
.whisper em{font-style:italic;color:${A.rust}}

/* chapters */
.chapters{padding:34px 0 6px}
.chapHead{text-align:center;padding:0 24px;margin-bottom:26px}
.secEyebrow{font-size:10.5px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:${A.gold};margin-bottom:10px}
.secEyebrow.center{text-align:center}
.secEyebrow.light{color:${A.gold}}
.secTitle{font-size:24px;font-weight:300;line-height:1.25;letter-spacing:-.01em;color:${A.brown};margin:0}
.secTitle.center{text-align:center}
.secTitle.light{color:${A.beige}}
.stepRail{display:flex;gap:12px;overflow-x:auto;padding:2px 20px 4px;scroll-snap-type:x mandatory}
.stepRail::-webkit-scrollbar{display:none}
.slide{flex:0 0 79%;scroll-snap-align:start;background:rgba(185,152,116,.12);
  border:1px solid rgba(185,152,116,.3);border-radius:18px;padding:12px 12px 18px;
  box-shadow:0 4px 16px rgba(72,45,34,.06)}
.chapImg{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:4/3.6;background:#f2e6cf}
.chapImg img{width:100%;height:100%;object-fit:cover}
.chapNum{position:absolute;top:10px;left:12px;font-size:36px;font-weight:300;color:${A.brown};
  letter-spacing:.02em;line-height:1}
.chapBody{padding:14px 4px 0}
.chapTitleRow{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.chapIcon{width:30px;height:30px;border-radius:50%;border:1px solid rgba(185,152,116,.55);display:flex;
  align-items:center;justify-content:center;color:${A.rust};flex:0 0 auto;background:${A.beige}}
.chapBody h3{font-size:16.5px;font-weight:600;color:${A.brown};margin:0;line-height:1.25}
.chapBody p{font-size:12.5px;font-weight:300;line-height:1.66;color:rgba(72,45,34,.86);margin:0}
.stepDots{display:flex;justify-content:center;gap:7px;margin-top:16px}
.sDot{width:5px;height:5px;border-radius:50%;background:rgba(137,110,80,.35);cursor:pointer;transition:all .25s}
.sDot.on{background:${A.rust};width:16px;border-radius:3px}

/* film */
.film{padding:10px 20px 6px}
.filmWrap{position:relative;border-radius:16px;overflow:hidden;aspect-ratio:16/10;background:#2a1c14}
.filmWrap img{width:100%;height:100%;object-fit:cover;opacity:.7}
.filmShade{position:absolute;inset:0;background:rgba(30,22,16,.35)}
.playBtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:58px;height:58px;
  border-radius:50%;background:rgba(139,63,44,.92);border:none;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:transform .2s;z-index:2}
.playBtn:hover{transform:translate(-50%,-50%) scale(1.06)}
.filmCaption{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:12px;
  letter-spacing:.05em;color:${A.beige};z-index:2}

/* pull quote */
.pull{text-align:center;padding:44px 30px 40px}
.pullMark{color:${A.gold};margin-bottom:14px}
.pull blockquote{font-size:21px;font-weight:300;line-height:1.5;color:${A.brown};margin:0 0 16px;font-style:italic}
.pullWho{font-size:10.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:${A.deepGold}}

/* archive */
.archive{padding:8px 0 10px}
.archIntro{font-size:13.5px;font-weight:300;line-height:1.65;color:rgba(72,45,34,.82);
  text-align:center;margin:14px 0 22px;padding:0 22px}
.rail{display:flex;gap:14px;overflow-x:auto;padding:0 20px 10px}
.rail::-webkit-scrollbar{display:none}
.acard{flex:0 0 210px;text-decoration:none}
.aimg{aspect-ratio:4/5;border-radius:14px;overflow:hidden;background:radial-gradient(120% 100% at 50% 30%,#fff,#f2e6cf);margin-bottom:10px}
.aimg img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.acard:hover .aimg img{transform:scale(1.04)}
.aname{font-size:14px;font-weight:500;color:${A.brown};line-height:1.3}
.anote{font-size:11.5px;font-style:italic;color:${A.deepGold};margin-top:3px}
.aenq{font-size:11.5px;font-weight:600;color:${A.rust};margin-top:8px}

/* pricing */
.pricing{margin:30px 0 0;padding:34px 24px 30px;background:${A.brown}}
.priceRows{margin:22px 0 0}
.prow{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,248,230,.14)}
.prow:last-child{border-bottom:none}
.prow .pk{flex:0 0 92px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:${A.gold};padding-top:2px}
.prow .pv{flex:1;font-size:13px;font-weight:300;line-height:1.6;color:rgba(255,248,230,.88)}
.prow .pv strong{font-weight:600;color:${A.beige}}
.prow.highlight{background:rgba(185,152,116,.12);border-radius:10px;padding:14px 12px;border-bottom:none;margin:4px -12px}
.priceNote{font-size:12px;font-weight:300;line-height:1.65;color:rgba(255,248,230,.7);text-align:center;margin:20px 0 0}

/* stories */
.stories{padding:36px 0 8px}
.reviewRail{display:flex;gap:14px;overflow-x:auto;padding:20px 20px 10px}
.reviewRail::-webkit-scrollbar{display:none}
.rcard{flex:0 0 280px;background:rgba(185,152,116,.1);border:1px solid rgba(185,152,116,.25);
  border-radius:14px;padding:18px}
.stars{color:${A.gold};font-size:13px;letter-spacing:.15em;margin-bottom:10px}
.rcard p{font-size:13px;font-weight:300;line-height:1.65;color:rgba(72,45,34,.86);margin:0 0 12px}
.rwho{font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:${A.deepGold}}

.begin{text-align:center;padding:44px 26px 40px}
.begin h2{font-size:26px;font-weight:300;color:${A.brown};margin:0 0 12px}
.begin p{font-size:14px;font-weight:300;line-height:1.7;color:rgba(72,45,34,.84);margin:0 0 22px}
.beginCta{display:inline-flex;align-items:center;gap:10px;background:${A.rust};color:${A.beige};
  text-decoration:none;font-size:14px;font-weight:600;padding:16px 24px;border-radius:13px;
  box-shadow:0 8px 22px rgba(139,63,44,.32);transition:transform .15s}
.beginCta:active{transform:scale(.98)}
.beginSub{font-size:11.5px;color:${A.deepGold};margin-top:14px;letter-spacing:.02em}

/* faq (proven pattern) */
.faq{padding:24px 20px 6px}
.faq .secHead{padding:0}
.secHead{font-size:19px;font-weight:400;color:${A.brown};margin:0 0 16px;letter-spacing:-.01em}
.fitem{border:1px solid rgba(185,152,116,.3);border-radius:13px;margin-bottom:10px;
  background:rgba(185,152,116,.06);transition:background .25s}
.fitem.open{background:rgba(185,152,116,.13)}
.fq{width:100%;display:flex;align-items:center;justify-content:space-between;gap:14px;background:none;border:none;
  cursor:pointer;padding:15px 16px;text-align:left;font-size:13.5px;font-weight:600;color:${A.brown};line-height:1.4}
.fq span{flex:1}
.fq .chev{color:${A.deepGold};transition:transform .3s;flex:0 0 auto}
.fitem.open .chev{transform:rotate(180deg)}
.faWrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .32s ease}
.fitem.open .faWrap{grid-template-rows:1fr}
.faInner{overflow:hidden;min-height:0}
.fa{margin:0;font-size:13px;line-height:1.65;color:rgba(72,45,34,.82);padding:0 16px 15px}

/* footer (same system as collection) */
.ftr{margin-top:0}
.ftrBrand{background:${A.beige};padding:26px 24px 24px;text-align:center;border-top:1px solid rgba(185,152,116,.3)}
.ftrAcc{border-bottom:1px solid rgba(185,152,116,.28)}
.ftrAcc button{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;
  cursor:pointer;padding:15px 2px;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:${A.brown}}
.ftrAcc .chev{color:${A.deepGold};transition:transform .3s}
.ftrAcc.open .chev{transform:rotate(180deg)}
.followUs{margin-top:24px}
.followHead{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:${A.brown};margin-bottom:14px}
.followRow{display:flex;justify-content:center;gap:22px;color:${A.deepGold}}
.ftrBand{background:${A.rust};color:${A.beige};padding:26px 24px 92px}
.bandRow{display:flex;gap:20px;margin-bottom:20px}
.bandCol{flex:1}
.bandLabel{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,248,230,.6);margin-bottom:6px}
.bandVal{font-size:13px;font-weight:400;color:${A.beige};line-height:1.4}
.bandCtas{display:flex;gap:10px;margin-bottom:20px}
.bandBtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid rgba(255,248,230,.5);
  color:${A.beige};text-decoration:none;font-size:12px;font-weight:600;padding:12px 8px;border-radius:10px;transition:all .2s}
.bandBtn:hover{background:rgba(255,248,230,.12)}
.bandGiva{text-align:center;font-size:10.5px;letter-spacing:.05em;color:rgba(255,248,230,.65);
  border-top:1px solid rgba(255,248,230,.18);padding-top:14px;margin-bottom:14px}
.bandBottom{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;
  letter-spacing:.03em;color:rgba(255,248,230,.7);border-top:1px solid rgba(255,248,230,.2);padding-top:16px}
.bandBottom span:first-child{font-weight:600;color:${A.beige}}

/* sticky single CTA */
.sticky{position:sticky;bottom:0;z-index:40;display:flex;padding:12px 16px;
  background:rgba(255,248,230,.9);backdrop-filter:blur(12px);border-top:1px solid rgba(185,152,116,.35)}
.sbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:14px;border-radius:12px;
  font-size:13.5px;font-weight:600;text-decoration:none;transition:transform .15s}
.sbtn:active{transform:scale(.97)}
.sbtn.wa{background:${A.rust};color:${A.beige};box-shadow:0 4px 14px rgba(139,63,44,.3)}
